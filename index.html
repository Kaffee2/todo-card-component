<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<main>
  <article data-testid="test-todo-card" class="todo-card">

    <!-- HEADER -->
    <div class="top">
      <h2 data-testid="test-todo-title" id="todo-title">
        Finish UI Design
      </h2>

      <label>
        <input 
          type="checkbox" 
          data-testid="test-todo-complete-toggle" 
          aria-labelledby="todo-title"
        />
        Mark complete
      </label>
    </div>

    <!-- DESCRIPTION -->
    <p data-testid="test-todo-description">
      Complete the Figma design for the AI writing assistant homepage.
    </p>

    <!-- PRIORITY + STATUS -->
    <div class="meta">
      <span 
        data-testid="test-todo-priority" 
        class="badge high"
        aria-label="High priority"
      >
        High
      </span>

      <span 
        data-testid="test-todo-status" 
        class="status"
      >
        Pending
      </span>
    </div>

    <!-- DUE DATE -->
    <time 
      data-testid="test-todo-due-date" 
      datetime="2026-03-01T18:00:00Z"
    >
      Due March 1, 2026
    </time>

    <!-- TIME REMAINING -->
    <div 
      data-testid="test-todo-time-remaining" 
      id="timeRemaining"
      aria-live="polite"
    ></div>

    <!-- TAGS -->
    <ul data-testid="test-todo-tags" class="tags" role="list">
      <li data-testid="test-todo-tag-work">work</li>
      <li data-testid="test-todo-tag-urgent">urgent</li>
      <li>design</li>
    </ul>

    <!-- ACTIONS -->
    <div class="actions">
      <button data-testid="test-todo-edit-button">Edit</button>
      <button data-testid="test-todo-delete-button">Delete</button>
    </div>

  </article>
</main>

<script src="script.js"></script>
</body>
</html>
